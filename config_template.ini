[CONFIG]
# 完成配置后 将模板重命名为config.ini
# 在Telegram申请的bot token
TELEGRAM_BOT_TOKEN=

# 在Telegram创建的频道ID
TELEGRAM_CHAT_ID=

# 在中国大陆境内给Telegram发送消息需要科学上网
# 本脚本支持http代理，请正确配置ip以及端口
# 如果在非中国大陆境内使用，请留空
# http代理格式为:http://127.0.0.1:7890
PROXY=

EMAIL_PORT=587

EMAIL_SERVER=smtp-mail.example.com

EMAIL_SENDER=johndoe@example.com

EMAIL_PASWD=Password13579

EMAIL_SUBSCRIBTION = example1@example.com,example2@example.com

# 数据源 futu yfinance akshare longbridge ibkr
# 全局数据源，当未配置市场专属数据源时使用
DATA_SOURCE=yfinance

# 按市场前缀分别配置数据源（可选），优先级高于 DATA_SOURCE
# 支持的市场前缀：HK US SH SZ
# DATA_SOURCE_HK=futu
# DATA_SOURCE_US=yfinance
# DATA_SOURCE_SH=akshare
# DATA_SOURCE_SZ=akshare

# Longbridge OpenAPI 配置
# 在 https://open.longbridge.com 申请
# LONGBRIDGE_APP_KEY=
# LONGBRIDGE_APP_SECRET=
# LONGBRIDGE_ACCESS_TOKEN=

# Interactive Brokers (IBKR) 配置
# 需要运行 IB Gateway 或 TWS
# IBKR_HOST=127.0.0.1
# IBKR_PORT=4001

# futuOpenD 部署地址
# 下载问题 https://github.com/FutunnOpen/py-futu-api/issues/137
# 行情权限 https://openapi.futunn.com/futu-api-doc/intro/authority.html#2867
FUTU_HOST=127.0.0.1

# futuOpenD 端口
FUTU_PORT=11111

# K线类型 K_DAY K_WEEK K_60M K_HALF_DAY
FUTU_PUSH_TYPE=K_DAY

# futu 自选股集合
FUTU_GROUP=

# 股票代码列表（逗号分隔，与FUTU_GROUP二选一或组合使用）
FUTU_CODE_LIST=HK.00700

# Webhook 配置（可选）
# Webhook 地址
WEBHOOK_URL=

# 用户内容写入 payload 的字段名（可选，默认 message）
# 示例：POST /hooks/agent 用 message，POST /hooks/wake 用 text
# WEBHOOK_CONTENT_FIELD = message

[WEBHOOK_HEADERS]
# 所有请求头写在这里，包括鉴权 header，新增字段无需修改代码

# 示例：OpenClaw webhook 认证
# x-openclaw-token    = your-hook-token

# 示例：Cloudflare Access 认证
# CF-Access-Client-Id     = your-cf-access-client-id
# CF-Access-Client-Secret = your-cf-access-client-secret

[WEBHOOK_PAYLOAD]
# 所有 payload 字段，新增字段无需修改代码；message 由代码自动附加

# 示例：OpenClaw hooks/agent
# channel        = qqbot
# to             = c2c:YOUR_OPENID
# name           = Notify
# wakeMode       = now
# deliver        = true
# thinking       = low
# timeoutSeconds = 30